name: OkeyApp
options:
  bundleIdPrefix: com.okeyapp
  deploymentTarget:
    iOS: "17.0"
  defaultConfig: Debug

targets:
  OkeyApp:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: src
        excludes:
          - "ml/README.md"
    info:
      path: src/app/Info.plist
      properties:
        CFBundleName: "101 Okey"
        CFBundleDisplayName: "101 Okey"
        NSCameraUsageDescription: "Okey taşlarını tanımak için kamera kullanılıyor"
        NSPhotoLibraryUsageDescription: "Taş fotoğrafı seçmek için galeri erişimi gerekiyor"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    entitlements:
      path: src/app/OkeyApp.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.okeyapp.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
